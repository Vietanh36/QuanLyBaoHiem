<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Chủ - Quản Lý Bảo Hiểm Ô Tô</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
       
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 40px 20px;
            margin: 0;
        }
        .container {
            max-width: 950px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 40px;
        }
        h1 { text-align: center; color: #007bff; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 40px; font-size: 18px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-weight: 500; margin-bottom: 8px; color: #333; }
        .required::after { content: " *"; color: red; }
        input, textarea { 
            padding: 12px 15px; 
            border: 2px solid #ddd; 
            border-radius: 8px; 
            font-size: 16px; 
        }
        input:focus, textarea:focus { 
            border-color: #007bff; 
            outline: none; 
            box-shadow: 0 0 0 3px rgba(0,123,255,0.2); 
        }
        .btn {
            background: #28a745; 
            color: white; 
            border: none; 
            padding: 14px 30px;
            border-radius: 8px; 
            font-size: 18px; 
            font-weight: 600; 
            cursor: pointer; 
            margin: 10px 5px;
        }
        .btn:hover { background: #218838; }
        .btn-view { background: #007bff; }
        .btn-view:hover { background: #0056b3; }
        .button-group { text-align: center; margin-top: 30px; }
        .error { color: red; font-size: 14px; margin-top: 5px; }
        .header-info {
            text-align: right;
            margin-bottom: 20px;
            font-size: 14px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-info">
            <strong id="userDisplay"></strong> | 
            <a href="#" onclick="logout()" style="color: red; text-decoration: none;">Đăng xuất</a>
        </div>

        <h1>Quản Lý Bảo Hiểm Ô Tô</h1>
        <p class="subtitle">Thêm bảo hiểm xe hơi - Thời hạn 1 năm</p>
       
        <div class="form-grid">
            <div class="form-group">
                <label class="required">Tên khách hàng</label>
                <input type="text" id="tenKhach" placeholder="Nguyễn Văn A">
                <div id="error-tenKhach" class="error"></div>
            </div>
            <div class="form-group">
                <label class="required">Số điện thoại</label>
                <input type="tel" id="sdt" placeholder="0987 654 321">
                <div id="error-sdt" class="error"></div>
            </div>
            <div class="form-group">
                <label>Địa chỉ</label>
                <input type="text" id="diaChi" placeholder="Hà Nội, Việt Nam">
            </div>
            <div class="form-group">
                <label class="required">Ngày cấp bảo hiểm</label>
                <input type="date" id="ngayCap" onchange="autoTinhNgayHetHan()">
                <div id="error-ngayCap" class="error"></div>
            </div>
            <div class="form-group">
                <label>Ngày hết hạn (tự động +1 năm)</label>
                <input type="date" id="ngayHetHan" readonly>
            </div>
            <div class="form-group">
                <label class="required">Hãng bảo hiểm</label>
                <input type="text" id="hangBaoHiem" placeholder="Bảo Việt, PTI, Liberty...">
                <div id="error-hangBaoHiem" class="error"></div>
            </div>
            <div class="form-group">
                <label>Loại xe</label>
                <input type="text" id="loaiXe" placeholder="Toyota Camry, Honda CR-V...">
            </div>
            <div class="form-group">
                <label class="required">Biển số xe</label>
                <input type="text" id="bienSo" placeholder="30A-123.45" style="text-transform: uppercase;">
                <div id="error-bienSo" class="error"></div>
            </div>
            <div class="form-group">
                <label>Ghi chú</label>
                <textarea id="note" rows="3" placeholder="Ghi chú thêm..."></textarea>
            </div>
        </div>

        <div class="button-group">
            <button onclick="themBaoHiem()" class="btn" id="btnAdd">✅ Thêm Bảo Hiểm</button>
            <a href="danh-sach-bao-hiem.html" 
               class="btn btn-view" 
               style="text-decoration:none; display:inline-block;">
                📋 Xem Danh Sách Bảo Hiểm
            </a>
        </div>
    </div>

    <script>
        const API_URL = "https://baohiem-backend-kdks.onrender.com/api/baohiem";

        // Kiểm tra đăng nhập
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            alert("⛔ Bạn chưa đăng nhập! Vui lòng đăng nhập trước.");
            window.location.href = "login.html";
        }

        const currentRole = localStorage.getItem('role');
        const username = localStorage.getItem('username') || "Người dùng";

        document.getElementById('userDisplay').innerHTML = 
            `Xin chào <strong>${username}</strong> (${currentRole === 'admin' ? 'Quản trị viên' : 'Nhân viên'})`;

        // Ẩn nút Thêm nếu là nhân viên
        if (currentRole !== 'admin') {
            document.getElementById('btnAdd').style.display = 'none';
        }

        function logout() {
            if (confirm("Bạn có chắc muốn đăng xuất?")) {
                localStorage.clear();
                window.location.href = "login.html";
            }
        }

        function autoTinhNgayHetHan() {
            const ngayCap = document.getElementById('ngayCap').value;
            if (ngayCap) {
                let date = new Date(ngayCap);
                date.setFullYear(date.getFullYear() + 1);
                document.getElementById('ngayHetHan').value = date.toISOString().slice(0, 10);
            }
        }

        async function themBaoHiem() {
            if (currentRole !== 'admin') {
                alert("⛔ Bạn không có quyền thêm bảo hiểm!");
                return;
            }

            const data = {
                tenkhach: document.getElementById('tenKhach').value.trim(),
                sdt: document.getElementById('sdt').value.trim(),
                diachi: document.getElementById('diaChi').value.trim(),
                ngaycap: document.getElementById('ngayCap').value,
                ngayhethan: document.getElementById('ngayHetHan').value,
                hangbh: document.getElementById('hangBaoHiem').value.trim(),
                loaixe: document.getElementById('loaiXe').value.trim(),
                bienso: document.getElementById('bienSo').value.trim().toUpperCase(),
                note: document.getElementById('note').value.trim()
            };

            // Kiểm tra bắt buộc
            if (!data.tenkhach || !data.sdt || !data.ngaycap || !data.hangbh || !data.bienso) {
                alert("❌ Vui lòng điền đầy đủ các trường có dấu *");
                return;
            }

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });

                const result = await res.json();

                if (result.success) {
                    alert("✅ Thêm bảo hiểm thành công!");
                    // Reset form
                    document.querySelectorAll('input, textarea').forEach(el => el.value = '');
                    // Chuyển sang danh sách
                    window.location.href = "danh-sach-bao-hiem.html";
                } else {
                    alert("❌ Thêm thất bại: " + (result.error || result.message || "Lỗi không xác định"));
                }
            } catch (err) {
                console.error(err);
                alert("❌ Không kết nối được với server. Vui lòng kiểm tra backend có đang chạy không?");
            }
        }

        // Nhấn Enter cũng thêm được
        document.addEventListener('keypress', (e) => {
            if (e.key === "Enter") themBaoHiem();
        });
    </script>
</body>
</html>
