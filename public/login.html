<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập Hệ Thống</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: white;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        h2 { 
            color: #007bff; 
            margin-bottom: 30px; 
        }
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover { background: #218838; }
        .error { 
            color: #dc3545; 
            text-align: center; 
            margin: 15px 0; 
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🔐 Đăng Nhập Hệ Thống</h2>
        
        <input type="email" id="email" placeholder="Nhập email">
        <input type="password" id="password" placeholder="Nhập mật khẩu">

        <button onclick="login()">Đăng Nhập</button>
        <div id="error" class="error"></div>
    </div>

    <script>
        function login() {
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value.trim();
            const errorEl = document.getElementById('error');

            if (!email || !password) {
                errorEl.textContent = "❌ Vui lòng nhập email và mật khẩu!";
                return;
            }

            let users = JSON.parse(localStorage.getItem('users')) || [];

            if (users.length === 0) {
                users = [
                    { email: "admin1@ad.com", password: "123456", role: "admin", createdAt: new Date().toISOString() }
                ];
                localStorage.setItem('users', JSON.stringify(users));
            }

            const user = users.find(u => 
                u.email.toLowerCase() === email && u.password === password
            );

            if (user) {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('role', user.role);
                localStorage.setItem('username', user.email);
                localStorage.setItem('email', user.email);

                alert(`✅ Đăng nhập thành công!\nChào mừng ${user.email}`);

                // Chuyển hướng theo vai trò
                if (user.role === 'admin') {
                    window.location.href = "index.html";        // Admin → Trang chủ
                } else {
                    window.location.href = "danh-sach-bao-hiem.html"; // Nhân viên → Danh sách bảo hiểm
                }
            } else {
                errorEl.textContent = "❌ Sai email hoặc mật khẩu!";
            }
        }

        document.addEventListener('keypress', (e) => {
            if (e.key === "Enter") login();
        });

        if (localStorage.getItem('isLoggedIn') === 'true') {
            const role = localStorage.getItem('role');
            if (role === 'admin') {
                window.location.href = "index.html";
            } else {
                window.location.href = "danh-sach-bao-hiem.html";
            }
        }

        window.onload = () => document.getElementById('email').focus();
    </script>
</body>
</html>
