<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Bảo Hiểm Ô TÔ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        
        body { font-family: 'Roboto', sans-serif; background: #f0f2f5; margin:0; padding:20px; }
        .container { max-width: 1500px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); overflow: hidden; }
        
        header { background: #007bff; color: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; }
        .nav-buttons { display: flex; gap: 10px; }
        .nav-btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; color: white; }
        .btn-home { background: #28a745; }
        .btn-add { background: #17a2b8; }
        .btn-logout { background: #dc3545; }

        .notification-bar { background: #d32f2f; color: white; padding: 12px 20px; margin: 15px; border-radius: 8px; display: none; align-items: center; justify-content: space-between; }
        
        .main { padding: 20px; }
        .search-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box { flex: 1; padding: 10px 20px; border-radius: 25px; border: 1px solid #ddd; outline: none; }

        /* Table */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; }
        th { background: #007bff; color: white; padding: 12px; text-align: left; position: relative; }
        td { padding: 12px; border-bottom: 1px solid #eee; }

        /* Excel Filter Style */
        .filter-icon { cursor: pointer; margin-left: 5px; font-size: 12px; }
        .filter-dropdown { 
            display: none; position: absolute; top: 100%; left: 0; 
            background: white; color: #333; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            padding: 10px; border-radius: 8px; z-index: 100; min-width: 150px;
            font-weight: normal;
        }
        .filter-dropdown.show { display: block; }
        .filter-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; cursor: pointer; }
        .filter-footer { border-top: 1px solid #eee; margin-top: 8px; padding-top: 8px; display: flex; justify-content: space-between; }
        .btn-filter { padding: 3px 8px; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; }

        /* Status */
        .status { padding: 5px 12px; border-radius: 15px; font-size: 13px; font-weight: bold; display: inline-block; min-width: 120px; text-align: center; }
        .con-han { background: #d4edda; color: #155724; }
        .sap-het { background: #fff3cd; color: #856404; }
        .het-han { background: #f8d7da; color: #721c24; }

        /* Action Buttons */
        .action-btn { padding: 6px 10px; border: none; border-radius: 4px; cursor: pointer; margin-right: 4px; font-size: 13px; }
        .edit-btn { background: #ffc107; }
        .delete-btn { background: #dc3545; color: white; }

        /* MODAL FIX */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { 
            background: white; width: 95%; max-width: 500px; border-radius: 12px; 
            display: flex; flex-direction: column; max-height: 85vh; 
        }
        .modal-header { padding: 15px 20px; border-bottom: 1px solid #eee; font-weight: bold; font-size: 18px; }
        .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
        .modal-footer { padding: 15px 20px; border-top: 1px solid #eee; display: flex; justify-content: flex-end; gap: 10px; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        .btn-save { background: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; }
        .btn-cancel { background: #6c757d; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div style="font-size: 20px; font-weight: bold;">🚗 Danh Sách Bảo Hiểm Ô Tô</div>
        <div class="nav-buttons">
            <button class="nav-btn btn-home" onclick="location.reload()">🏠 Trang Chủ</button>
            <button class="nav-btn btn-add">Thêm Bảo Hiểm Mới</button>
            <button class="nav-btn btn-logout">Đăng xuất</button>
        </div>
    </header>

    <div class="main">
        <div id="notificationBar" class="notification-bar">
            <span>🚨 CÓ <b id="countExpiring">0</b> BẢO HIỂM SẮP HẾT HẠN (dưới 30 ngày)</span>
            <button onclick="this.parentElement.style.display='none'" style="background:none; border:none; color:white; cursor:pointer;">✕</button>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" class="search-box" placeholder="🔎 Tìm theo tên khách hàng, biển số xe, hãng..." onkeyup="filterTable()">
            <button onclick="loadData()" style="padding: 10px 20px; border-radius: 20px; border: 1px solid #ddd; cursor: pointer;">🔄 Tải lại</button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>STT</th>
                        <th>Tên khách hàng</th>
                        <th>SĐT</th>
                        <th>Ngày cấp</th>
                        <th>Ngày hết hạn</th>
                        <th>Hãng BH</th>
                        <th>Loại xe</th>
                        <th>Biển số</th>
                        <th>Note</th>
                        <th>
                            Trạng thái <span class="filter-icon" onclick="toggleFilter(event)">▼</span>
                            <div id="filterMenu" class="filter-dropdown">
                                <div class="filter-item"><input type="checkbox" value="CON_HAN" checked> Còn hạn</div>
                                <div class="filter-item"><input type="checkbox" value="SAP_HET" checked> Sắp hết</div>
                                <div class="filter-item"><input type="checkbox" value="HET_HAN" checked> Hết hạn</div>
                                <div class="filter-footer">
                                    <button class="btn-filter" onclick="resetFilter()">Tất cả</button>
                                    <button class="btn-filter" style="background:#007bff; color:white;" onclick="filterTable()">Lọc</button>
                                </div>
                            </div>
                        </th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">✏️ Sửa Thông Tin Bảo Hiểm</div>
        <div class="modal-body">
            <input type="hidden" id="editId">
            <div class="form-group"><label>Tên khách hàng</label><input type="text" id="editTenKhach"></div>
            <div class="form-group"><label>Số điện thoại</label><input type="text" id="editSdt"></div>
            <div class="form-group"><label>Ngày cấp</label><input type="date" id="editNgayCap"></div>
            <div class="form-group"><label>Ngày hết hạn</label><input type="date" id="editNgayHetHan"></div>
            <div class="form-group"><label>Hãng bảo hiểm</label><input type="text" id="editHangBH"></div>
            <div class="form-group"><label>Loại xe</label><input type="text" id="editLoaiXe"></div>
            <div class="form-group"><label>Biển số xe</label><input type="text" id="editBienSo" style="text-transform:uppercase;"></div>
            <div class="form-group"><label>Ghi chú</label><textarea id="editNote" rows="3"></textarea></div>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal()">Hủy</button>
            <button class="btn-save" onclick="saveBaoHiem()">Lưu thông tin</button>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://baohiem-backend-kdks.onrender.com/api/baohiem";
    let danhSachGoc = [];

    async function loadData() {
        try {
            const res = await fetch(API_URL);
            danhSachGoc = await res.json();
            filterTable();
            updateNotification();
        } catch (e) { alert("Lỗi tải dữ liệu!"); }
    }

    function getTrangThai(dateStr) {
        if (!dateStr) return { text: "N/A", class: "", key: "" };
        const today = new Date();
        today.setHours(0,0,0,0);
        const exp = new Date(dateStr);
        const diffDays = Math.ceil((exp - today) / (1000 * 60 * 60 * 24));

        if (diffDays < 0) return { text: "HẾT HẠN", class: "het-han", key: "HET_HAN" };
        if (diffDays <= 30) return { text: `SẮP HẾT (${diffDays}n)`, class: "sap-het", key: "SAP_HET" };
        return { text: `CÒN HẠN (${diffDays}n)`, class: "con-han", key: "CON_HAN" };
    }

    function filterTable() {
        const keyword = document.getElementById('searchInput').value.toLowerCase();
        const selectedKeys = Array.from(document.querySelectorAll('#filterMenu input:checked')).map(i => i.value);
        
        const filtered = danhSachGoc.filter(item => {
            const status = getTrangThai(item.ngayhethan);
            const matchSearch = (item.tenkhach || "").toLowerCase().includes(keyword) || 
                                (item.bienso || "").toLowerCase().includes(keyword);
            const matchFilter = selectedKeys.includes(status.key);
            return matchSearch && matchFilter;
        });

        renderTable(filtered);
        document.getElementById('filterMenu').classList.remove('show');
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        data.forEach((item, index) => {
            const st = getTrangThai(item.ngayhethan);
            tbody.innerHTML += `
                <tr>
                    <td>${index + 1}</td>
                    <td><b>${item.tenkhach || ''}</b></td>
                    <td>${item.sdt || ''}</td>
                    <td>${item.ngaycap ? new Date(item.ngaycap).toLocaleDateString('vi-VN') : ''}</td>
                    <td><b>${item.ngayhethan ? new Date(item.ngayhethan).toLocaleDateString('vi-VN') : ''}</b></td>
                    <td>${item.hangbh || ''}</td>
                    <td>${item.loaixe || ''}</td>
                    <td style="text-transform:uppercase;">${item.bienso || ''}</td>
                    <td style="color:#888; font-size:12px;">${item.note || ''}</td>
                    <td><span class="status ${st.class}">${st.text}</span></td>
                    <td>
                        <button class="action-btn edit-btn" onclick="editBaoHiem(${item.id})">Sửa</button>
                        <button class="action-btn delete-btn" onclick="deleteBaoHiem(${item.id})">Xóa</button>
                    </td>
                </tr>
            `;
        });
    }

    function toggleFilter(e) {
        e.stopPropagation();
        document.getElementById('filterMenu').classList.toggle('show');
    }

    function resetFilter() {
        document.querySelectorAll('#filterMenu input').forEach(i => i.checked = true);
        filterTable();
    }

    function editBaoHiem(id) {
        const item = danhSachGoc.find(x => x.id === id);
        if(!item) return;
        document.getElementById('editId').value = item.id;
        document.getElementById('editTenKhach').value = item.tenkhach;
        document.getElementById('editSdt').value = item.sdt;
        document.getElementById('editNgayCap').value = item.ngaycap ? item.ngaycap.split('T')[0] : '';
        document.getElementById('editNgayHetHan').value = item.ngayhethan ? item.ngayhethan.split('T')[0] : '';
        document.getElementById('editHangBH').value = item.hangbh;
        document.getElementById('editLoaiXe').value = item.loaixe;
        document.getElementById('editBienSo').value = item.bienso;
        document.getElementById('editNote').value = item.note;
        document.getElementById('editModal').style.display = 'flex';
    }

    async function saveBaoHiem() {
        const id = document.getElementById('editId').value;
        const data = {
            tenkhach: document.getElementById('editTenKhach').value,
            sdt: document.getElementById('editSdt').value,
            ngaycap: document.getElementById('editNgayCap').value,
            ngayhethan: document.getElementById('editNgayHetHan').value,
            hangbh: document.getElementById('editHangBH').value,
            loaixe: document.getElementById('editLoaiXe').value,
            bienso: document.getElementById('editBienSo').value.toUpperCase(),
            note: document.getElementById('editNote').value
        };
        const res = await fetch(`${API_URL}/${id}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        if(res.ok) { closeModal(); loadData(); }
    }

    function closeModal() { document.getElementById('editModal').style.display = 'none'; }

    function updateNotification() {
        const count = danhSachGoc.filter(item => {
            const st = getTrangThai(item.ngayhethan);
            return st.key === "SAP_HET";
        }).length;
        if(count > 0) {
            document.getElementById('notificationBar').style.display = 'flex';
            document.getElementById('countExpiring').innerText = count;
        } else {
            document.getElementById('notificationBar').style.display = 'none';
        }
    }

    // Đóng filter khi bấm ra ngoài
    window.onclick = () => document.getElementById('filterMenu').classList.remove('show');

    window.onload = loadData;
</script>
</body>
</html>
