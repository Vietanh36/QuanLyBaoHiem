<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Bảo Hiểm Ô Tô</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        header {
            background: linear-gradient(90deg, #007bff, #0056b3);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo { font-size: 26px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .nav-buttons { display: flex; gap: 12px; }
        .nav-btn {
            padding: 10px 22px;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
        }
        .btn-home { background: #28a745; }
        .btn-add { background: #007bff; }

        .notification-bar {
            background: #d32f2f;
            color: white;
            padding: 15px 25px;
            margin: 20px;
            border-radius: 8px;
            display: none;
            align-items: center;
            gap: 15px;
            font-weight: 600;
        }
        .main { padding: 30px; }
        .search-box {
            width: 100%;
            max-width: 450px;
            padding: 12px 20px;
            border-radius: 50px;
            border: 2px solid #ddd;
            font-size: 16px;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td {
            padding: 14px 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th { background: #007bff; color: white; }
        .status {
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            display: inline-block;
            min-width: 145px;
        }
        .con-han { background: #d4edda; color: #155724; }
        .sap-het { background: #fff3cd; color: #856404; animation: pulse 2s infinite; }
        .het-han { background: #f8d7da; color: #721c24; }
        .action-btn {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 6px;
        }
        .edit-btn { background: #ffc107; color: #212529; }
        .delete-btn { background: #dc3545; color: white; }
        .note-cell { cursor: pointer; min-width: 180px; max-width: 250px; white-space: pre-wrap; }
        .note-cell:hover { background-color: #f8f9fa; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 90%;
            max-width: 520px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
        }
        .form-group textarea { height: 80px; resize: vertical; }
        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        .btn-cancel { background: #6c757d; color: white; padding: 10px 20px; border: none; border-radius: 6px; }
        .btn-save { background: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 6px; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.85; } }
    </style>
</head>
<body>
    <div class="container">
       <header>
    <div class="logo">🚗 Danh Sách Bảo Hiểm Ô Tô</div>
    <div class="nav-buttons">
        <button onclick="switchToHome()" class="nav-btn btn-home">🏠 Trang Chủ</button>
        <button onclick="switchToAdd()" class="nav-btn btn-add">Thêm Bảo Hiểm Mới</button>
        
        <!-- Nút Đăng xuất -->
        <button onclick="logout()" class="nav-btn btn-logout" style="background:#dc3545;">
            Đăng xuất
        </button>
    </div>
</header>

        <div class="main">
            <div id="notificationBar" class="notification-bar">
                🚨 CÓ <span id="countExpiring" style="font-size:22px; font-weight:bold"></span>
                BẢO HIỂM SẮP HẾT HẠN (dưới 30 ngày)
                <button onclick="hideNotification()" style="margin-left:auto; background:none; border:none; color:white; font-size:24px; cursor:pointer;">✕</button>
            </div>

            <div style="margin-bottom: 15px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                <input type="text" id="searchInput" class="search-box" style="flex: 1;"
                       placeholder="🔎 Tìm theo tên khách hàng, biển số xe, hãng bảo hiểm, note..."
                       onkeyup="searchTable()">
                
                <button onclick="loadData()" 
                        style="padding: 10px 22px; background:#17a2b8; color:white; border:none; border-radius:8px; cursor:pointer;">
                    🔄 Tải lại từ Server
                </button>
            </div>

            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr>
                            <th>STT</th>
                            <th>Tên khách hàng</th>
                            <th>SĐT</th>
                            <th>Ngày cấp</th>
                            <th>Ngày hết hạn</th>
                            <th>Hãng BH</th>
                            <th>Loại xe</th>
                            <th>Biển số</th>
                            <th>Note (Click để sửa)</th>
                            <th>Trạng thái</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <div style="text-align:center; padding:25px; background:#f8f9fa;">
            <button onclick="exportData()" style="background:#007bff; color:white; padding:12px 30px; border:none; border-radius:8px; font-size:16px; cursor:pointer;">
                📤 Xuất File Excel (CSV)
            </button>
        </div>
    </div>

    <!-- Modal Sửa -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h2>✏️ Sửa Thông Tin Bảo Hiểm</h2>
            <input type="hidden" id="editId">
            <div class="form-group"><label>Tên khách hàng</label><input type="text" id="editTenKhach"></div>
            <div class="form-group"><label>Số điện thoại</label><input type="text" id="editSdt"></div>
            <div class="form-group"><label>Ngày cấp</label><input type="date" id="editNgayCap"></div>
            <div class="form-group"><label>Ngày hết hạn</label><input type="date" id="editNgayHetHan"></div>
            <div class="form-group"><label>Hãng bảo hiểm</label><input type="text" id="editHangBH"></div>
            <div class="form-group"><label>Loại xe</label><input type="text" id="editLoaiXe"></div>
            <div class="form-group"><label>Biển số xe</label><input type="text" id="editBienSo" style="text-transform:uppercase;"></div>
            <div class="form-group"><label>Ghi chú</label><textarea id="editNote"></textarea></div>

            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeModal()">Hủy</button>
                <button class="btn-save" onclick="saveBaoHiem()">Lưu thay đổi</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://baohiem-backend-kdks.onrender.com/api/baohiem";
        let danhSachBaoHiem = [];

        async function loadData() {
            try {
                const res = await fetch(API_URL);
                if (!res.ok) throw new Error("Lỗi server");
                danhSachBaoHiem = await res.json();
                renderTable();
                checkThongBaoDo();
            } catch (err) {
                console.error(err);
                alert("❌ Không tải được dữ liệu từ server. Vui lòng thử lại!");
            }
        }

        function getTrangThai(ngayHetHan) {
            if (!ngayHetHan) return { text: "Không xác định", class: "" };
            const today = new Date();
            today.setHours(0,0,0,0);
            const hetHan = new Date(ngayHetHan);
            const diffDays = Math.ceil((hetHan - today) / (1000*60*60*24));

            if (diffDays < 0) return { text: "HẾT HẠN", class: "het-han" };
            if (diffDays <= 30) return { text: `SẮP HẾT (${diffDays} ngày)`, class: "sap-het" };
            return { text: `CÒN HẠN (${diffDays} ngày)`, class: "con-han" };
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            danhSachBaoHiem.forEach((item, index) => {
                const status = getTrangThai(item.ngayhethan);
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td><strong>${item.tenkhach || ''}</strong></td>
                    <td>${item.sdt || ''}</td>
                    <td>${item.ngaycap || ''}</td>
                    <td><strong>${item.ngayhethan || ''}</strong></td>
                    <td>${item.hangbh || ''}</td>
                    <td>${item.loaixe || ''}</td>
                    <td style="text-transform:uppercase;">${item.bienso || ''}</td>
                    <td class="note-cell" onclick="editNoteInline(this, ${item.id})">${item.note || '<i style="color:#aaa;">(Chưa có ghi chú)</i>'}</td>
                    <td><span class="status ${status.class}">${status.text}</span></td>
                    <td>
                        <button onclick="editBaoHiem(${item.id})" class="action-btn edit-btn">✏️ Sửa</button>
                        <button onclick="deleteBaoHiem(${item.id})" class="action-btn delete-btn">🗑️ Xóa</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function editBaoHiem(id) {
            const item = danhSachBaoHiem.find(x => x.id === id);
            if (!item) return;

            document.getElementById('editId').value = item.id;
            document.getElementById('editTenKhach').value = item.tenkhach || '';
            document.getElementById('editSdt').value = item.sdt || '';
            document.getElementById('editNgayCap').value = item.ngaycap ? item.ngaycap.split('T')[0] : '';
            document.getElementById('editNgayHetHan').value = item.ngayhethan ? item.ngayhethan.split('T')[0] : '';
            document.getElementById('editHangBH').value = item.hangbh || '';
            document.getElementById('editLoaiXe').value = item.loaixe || '';
            document.getElementById('editBienSo').value = item.bienso || '';
            document.getElementById('editNote').value = item.note || '';

            document.getElementById('editModal').style.display = 'flex';
        }

        async function saveBaoHiem() {
            const id = document.getElementById('editId').value;
            const data = {
                tenkhach: document.getElementById('editTenKhach').value.trim(),
                sdt: document.getElementById('editSdt').value.trim(),
                ngaycap: document.getElementById('editNgayCap').value,
                ngayhethan: document.getElementById('editNgayHetHan').value,
                hangbh: document.getElementById('editHangBH').value.trim(),
                loaixe: document.getElementById('editLoaiXe').value.trim(),
                bienso: document.getElementById('editBienSo').value.trim().toUpperCase(),
                note: document.getElementById('editNote').value.trim()
            };

            try {
                const url = id ? `${API_URL}/${id}` : API_URL;
                const method = id ? 'PUT' : 'POST';

                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    alert(id ? "✅ Cập nhật thành công!" : "✅ Thêm thành công!");
                    closeModal();
                    loadData();
                } else {
                    alert("❌ Có lỗi khi lưu dữ liệu");
                }
            } catch (err) {
                alert("❌ Không kết nối được với server");
            }
        }

        async function deleteBaoHiem(id) {
            if (!confirm("Bạn có chắc muốn xóa?")) return;
            try {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                loadData();
            } catch (err) {
                alert("Lỗi khi xóa");
            }
        }

        function editNoteInline(cell, id) {
            const current = cell.textContent.trim() === '(Chưa có ghi chú)' ? '' : cell.textContent.trim();
            const input = document.createElement('textarea');
            input.value = current;
            input.style.width = '100%';
            input.style.height = '60px';
            cell.innerHTML = '';
            cell.appendChild(input);
            input.focus();

            const save = async () => {
                try {
                    await fetch(`${API_URL}/${id}`, {
                        method: 'PUT',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ note: input.value.trim() })
                    });
                    loadData();
                } catch(e) { alert("Lỗi cập nhật note"); }
            };
            input.onblur = save;
            input.onkeydown = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); save(); } };
        }

        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        function checkThongBaoDo() {
            const today = new Date();
            let count = danhSachBaoHiem.filter(item => {
                const diff = Math.ceil((new Date(item.ngayhethan) - today) / (86400000));
                return diff > 0 && diff <= 30;
            }).length;

            const bar = document.getElementById('notificationBar');
            if (count > 0) {
                document.getElementById('countExpiring').textContent = count;
                bar.style.display = 'flex';
            } else {
                bar.style.display = 'none';
            }
        }

        function searchTable() {
            const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!keyword) return renderTable();

            const filtered = danhSachBaoHiem.filter(item =>
                (item.tenkhach || '').toLowerCase().includes(keyword) ||
                (item.sdt || '').includes(keyword) ||
                (item.bienso || '').toLowerCase().includes(keyword) ||
                (item.hangbh || '').toLowerCase().includes(keyword)
            );
            // Tạm render filtered (cần cải tiến sau nếu muốn)
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            // ... (bạn có thể copy logic renderTable nếu cần)
            renderTable(); // tạm thời render full
        }

        function exportData() {
            let csv = "\uFEFFSTT,Tên khách hàng,SĐT,Ngày cấp,Ngày hết hạn,Hãng BH,Loại xe,Biển số,Note,Trạng thái\n";
            danhSachBaoHiem.forEach((item, i) => {
                const status = getTrangThai(item.ngayhethan);
                csv += `${i+1},"${item.tenkhach || ''}","${item.sdt || ''}",${item.ngaycap || ''},${item.ngayhethan || ''},"${item.hangbh || ''}","${item.loaixe || ''}","${item.bienso || ''}","${item.note || ''}","${status.text}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `BaoHiem_Oto_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
        }

        function switchToHome() {
            window.location.href = "index.html";
        }

        function switchToAdd() {
            window.location.href = "index.html";
        }
        function logout() {
    if (confirm("Bạn có chắc muốn đăng xuất?")) {
        localStorage.removeItem('isLoggedIn');
        localStorage.removeItem('role');
        localStorage.removeItem('username');
        window.location.href = "login.html";
    }
}

function switchToHome() {
    window.location.href = "index.html";
}

function switchToAdd() {
    window.location.href = "index.html";   // hoặc trang thêm nếu bạn có file riêng
}

        // Khởi động
        window.onload = loadData;
    </script>
</body>
</html>
