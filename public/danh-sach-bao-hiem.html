<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Bảo Hiểm Ô Tô</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        header {
            background: linear-gradient(90deg, #007bff, #0056b3);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo { font-size: 26px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .nav-btn {
            padding: 10px 22px;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
        }
        .btn-home { background: #28a745; }
        .btn-add { background: #007bff; }
        .btn-logout { background: #dc3545; }

        .main { padding: 30px; }
        .search-box {
            width: 100%;
            max-width: 450px;
            padding: 12px 20px;
            border-radius: 50px;
            border: 2px solid #ddd;
            font-size: 16px;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td {
            padding: 14px 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th { background: #007bff; color: white; }
        .status {
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            display: inline-block;
            min-width: 145px;
        }
        .con-han { background: #d4edda; color: #155724; }
        .sap-het { background: #fff3cd; color: #856404; animation: pulse 2s infinite; }
        .het-han { background: #f8d7da; color: #721c24; }
        .action-btn {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 6px;
        }
        .edit-btn { background: #ffc107; color: #212529; }
        .delete-btn { background: #dc3545; color: white; }
        .note-cell { cursor: pointer; min-width: 180px; }
        .note-cell:hover { background: #f8f9fa; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 90%;
            max-width: 520px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; }
        .btn-cancel { background: #6c757d; color: white; }
        .btn-save { background: #28a745; color: white; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.85; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">🚗 Danh Sách Bảo Hiểm Ô Tô</div>
            <div>
                <button onclick="switchToHome()" class="nav-btn btn-home">🏠 Trang Chủ</button>
                <button onclick="switchToAdd()" class="nav-btn btn-add">Thêm Bảo Hiểm Mới</button>
                <button onclick="logout()" class="nav-btn btn-logout">Đăng xuất</button>
            </div>
        </header>

        <div class="main">
            <div id="notificationBar" class="notification-bar" style="display:none;">
                🚨 CÓ <span id="countExpiring">0</span> BẢO HIỂM SẮP HẾT HẠN
                <button onclick="hideNotification()" style="margin-left:auto;background:none;border:none;color:white;font-size:20px;cursor:pointer;">✕</button>
            </div>

            <div style="margin-bottom:15px;display:flex;gap:10px;flex-wrap:wrap;">
                <input type="text" id="searchInput" class="search-box" 
                       placeholder="🔎 Tìm theo tên, biển số, hãng BH..." onkeyup="searchTable()">
                
                <button onclick="loadData()" style="padding:10px 20px;background:#17a2b8;color:white;border:none;border-radius:8px;cursor:pointer;">
                    🔄 Tải lại từ Server
                </button>
            </div>

            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr>
                            <th>STT</th>
                            <th>Tên khách hàng</th>
                            <th>SĐT</th>
                            <th>Ngày cấp</th>
                            <th>Ngày hết hạn</th>
                            <th>Hãng BH</th>
                            <th>Loại xe</th>
                            <th>Biển số</th>
                            <th>Note</th>
                            <th>Trạng thái</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <div style="text-align:center;padding:25px;background:#f8f9fa;">
            <button onclick="exportData()" style="background:#007bff;color:white;padding:12px 30px;border:none;border-radius:8px;font-size:16px;cursor:pointer;">
                📤 Xuất File Excel (CSV)
            </button>
        </div>
    </div>

    <!-- Modal Sửa -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h2>✏️ Sửa Bảo Hiểm</h2>
            <input type="hidden" id="editId">
            <div class="form-group"><label>Tên khách hàng</label><input type="text" id="editTenKhach"></div>
            <div class="form-group"><label>SĐT</label><input type="text" id="editSdt"></div>
            <div class="form-group"><label>Ngày cấp</label><input type="date" id="editNgayCap"></div>
            <div class="form-group"><label>Ngày hết hạn</label><input type="date" id="editNgayHetHan"></div>
            <div class="form-group"><label>Hãng BH</label><input type="text" id="editHangBH"></div>
            <div class="form-group"><label>Loại xe</label><input type="text" id="editLoaiXe"></div>
            <div class="form-group"><label>Biển số</label><input type="text" id="editBienSo" style="text-transform:uppercase"></div>
            <div class="form-group"><label>Note</label><textarea id="editNote"></textarea></div>

            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeModal()">Hủy</button>
                <button class="btn-save" onclick="saveEdit()">Lưu</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://baohiem-backend-kdks.onrender.com/api/baohiem";

        let danhSachBaoHiem = [];

        async function loadData() {
            try {
                const res = await fetch(API_URL);
                if (!res.ok) throw new Error("Lỗi server");
                danhSachBaoHiem = await res.json();
                renderTable();
            } catch (e) {
                console.error(e);
                alert("❌ Không kết nối được với Backend. Kiểm tra backend có đang chạy không?");
            }
        }

        function getTrangThai(ngayHetHan) {
            if (!ngayHetHan) return {text: "Không rõ", class: ""};
            const today = new Date();
            const hetHan = new Date(ngayHetHan);
            const diff = Math.ceil((hetHan - today) / 86400000);

            if (diff < 0) return {text: "HẾT HẠN", class: "het-han"};
            if (diff <= 30) return {text: `SẮP HẾT (${diff} ngày)`, class: "sap-het"};
            return {text: `CÒN HẠN (${diff} ngày)`, class: "con-han"};
        }

        function formatDate(date) {
            if (!date) return '';
            return new Date(date).toLocaleDateString('vi-VN');
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            danhSachBaoHiem.forEach((item, i) => {
                const st = getTrangThai(item.ngayhethan || item.ngayHetHan);
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${i+1}</td>
                    <td>${item.tenkhach || item.tenKhach || ''}</td>
                    <td>${item.sdt || ''}</td>
                    <td>${formatDate(item.ngaycap || item.ngayCap)}</td>
                    <td>${formatDate(item.ngayhethan || item.ngayHetHan)}</td>
                    <td>${item.hangbh || item.hangBH || ''}</td>
                    <td>${item.loaixe || item.loaiXe || ''}</td>
                    <td style="text-transform:uppercase">${item.bienso || item.bienSo || ''}</td>
                    <td>${item.note || '(Chưa có)'}</td>
                    <td><span class="status ${st.class}">${st.text}</span></td>
                    <td>
                        <button onclick="editBaoHiem(${item.id})" class="action-btn edit-btn">Sửa</button>
                        <button onclick="deleteBaoHiem(${item.id})" class="action-btn delete-btn">Xóa</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function editBaoHiem(id) {
            const item = danhSachBaoHiem.find(x => x.id === id);
            if (!item) return;

            document.getElementById('editId').value = item.id;
            document.getElementById('editTenKhach').value = item.tenkhach || item.tenKhach || '';
            document.getElementById('editSdt').value = item.sdt || '';
            document.getElementById('editNgayCap').value = (item.ngaycap || item.ngayCap || '').split('T')[0];
            document.getElementById('editNgayHetHan').value = (item.ngayhethan || item.ngayHetHan || '').split('T')[0];
            document.getElementById('editHangBH').value = item.hangbh || item.hangBH || '';
            document.getElementById('editLoaiXe').value = item.loaixe || item.loaiXe || '';
            document.getElementById('editBienSo').value = item.bienso || item.bienSo || '';
            document.getElementById('editNote').value = item.note || '';

            document.getElementById('editModal').style.display = 'flex';
        }

        async function saveEdit() {
            const id = document.getElementById('editId').value;
            const data = {
                tenkhach: document.getElementById('editTenKhach').value.trim(),
                sdt: document.getElementById('editSdt').value.trim(),
                ngaycap: document.getElementById('editNgayCap').value,
                ngayhethan: document.getElementById('editNgayHetHan').value,
                hangbh: document.getElementById('editHangBH').value.trim(),
                loaixe: document.getElementById('editLoaiXe').value.trim(),
                bienso: document.getElementById('editBienSo').value.trim().toUpperCase(),
                note: document.getElementById('editNote').value.trim()
            };

            try {
                const method = id ? 'PUT' : 'POST';
                const url = id ? `${API_URL}/${id}` : API_URL;

                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    alert("✅ Lưu thành công!");
                    closeModal();
                    loadData();
                } else {
                    alert("❌ Lưu thất bại!");
                }
            } catch (e) {
                alert("❌ Không kết nối được với backend");
            }
        }

        async function deleteBaoHiem(id) {
            if (!confirm("Xóa bảo hiểm này?")) return;
            try {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                loadData();
            } catch (e) {
                alert("Lỗi khi xóa");
            }
        }

        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        function searchTable() {
            const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!keyword) return renderTable();

            const filtered = danhSachBaoHiem.filter(item => 
                (item.tenkhach || '').toLowerCase().includes(keyword) ||
                (item.bienso || '').toLowerCase().includes(keyword)
            );
            // Tạm thời render lại full (có thể cải tiến sau)
            renderTable();
        }

        function exportData() {
            alert("Chức năng xuất Excel đang được hoàn thiện.");
        }

        function logout() {
            if (confirm("Đăng xuất?")) {
                localStorage.clear();
                window.location.href = "login.html";
            }
        }

        function switchToHome() { window.location.href = "index.html"; }
        function switchToAdd() { window.location.href = "index.html"; }

        // Tự động tải dữ liệu khi mở trang
        window.onload = loadData;
    </script>
</body>
</html>
