<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Bảo Hiểm Ô Tô</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
      
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        header {
            background: linear-gradient(90deg, #007bff, #0056b3);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo {
            font-size: 26px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nav-buttons {
            display: flex;
            gap: 12px;
        }
        .nav-btn {
            padding: 10px 22px;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-home { background: #28a745; }
        .btn-add { background: #007bff; }
        .btn-register { background: #6f42c1; }
        .btn-logout { background: #dc3545; }

        .notification-bar {
            background: #d32f2f;
            color: white;
            padding: 15px 25px;
            margin: 20px;
            border-radius: 8px;
            display: none;
            align-items: center;
            gap: 15px;
            font-weight: 600;
        }
        .main { padding: 30px; }
        .search-box {
            width: 100%;
            max-width: 450px;
            padding: 12px 20px;
            border-radius: 50px;
            border: 2px solid #ddd;
            font-size: 16px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 14px 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
            vertical-align: middle;
        }
        th {
            background: #007bff;
            color: white;
        }
        .status {
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            display: inline-block;
            min-width: 145px;
        }
        .con-han { background: #d4edda; color: #155724; }
        .sap-het { background: #fff3cd; color: #856404; animation: pulse 2s infinite; }
        .het-han { background: #f8d7da; color: #721c24; }
        tr.sap-het-han { background: #fff3cd !important; }

        .action-btn {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 6px;
        }
        .edit-btn { background: #ffc107; color: #212529; }
        .delete-btn { background: #dc3545; color: white; }

        .note-cell {
            cursor: pointer;
            min-width: 180px;
            max-width: 250px;
            white-space: pre-wrap;
        }
        .note-cell:hover { background-color: #f8f9fa; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 90%;
            max-width: 520px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-height: 90vh;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">🚗 Danh Sách Bảo Hiểm Ô Tô</div>
            <div class="nav-buttons">
                <button onclick="switchToHome()" class="nav-btn btn-home">🏠 Trang Chủ</button>
                <button onclick="showAddModal()" class="nav-btn btn-add">Thêm Bảo Hiểm Mới</button>
                <button onclick="showRegisterModal()" class="nav-btn btn-register" id="btnRegister">Đăng ký tài khoản</button>
                <button onclick="logout()" class="nav-btn btn-logout">Đăng xuất</button>
            </div>
        </header>

        <div class="main">
            <div id="notificationBar" class="notification-bar">
                🚨 CÓ <span id="countExpiring" style="font-size:22px; font-weight:bold"></span>
                BẢO HIỂM SẮP HẾT HẠN (dưới 30 ngày)
                <button onclick="hideNotification()" style="margin-left:auto; background:none; border:none; color:white; font-size:24px; cursor:pointer;">✕</button>
            </div>

            <div style="margin-bottom: 15px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                <input type="text" id="searchInput" class="search-box" style="flex: 1;"
                       placeholder="🔎 Tìm theo tên khách hàng, biển số xe, hãng bảo hiểm, note..."
                       onkeyup="searchTable()">
                
                <button onclick="loadData()" 
                        style="padding: 10px 22px; background:#17a2b8; color:white; border:none; border-radius:8px; cursor:pointer;">
                    🔄 Tải lại từ Server
                </button>
            </div>

            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr>
                            <th>STT</th>
                            <th>Tên khách hàng</th>
                            <th>SĐT</th>
                            <th>Ngày cấp</th>
                            <th>Ngày hết hạn</th>
                            <th>Hãng BH</th>
                            <th>Loại xe</th>
                            <th>Biển số</th>
                            <th>Note (Click để sửa)</th>
                            <th>Trạng thái</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <div style="text-align:center; padding:25px; background:#f8f9fa;">
            <button onclick="exportData()" style="background:#007bff; color:white; padding:12px 30px; border:none; border-radius:8px; font-size:16px; cursor:pointer;">
                📤 Xuất File Excel (CSV)
            </button>
        </div>
    </div>

    <!-- Modal Sửa / Thêm -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">✏️ Sửa Thông Tin Bảo Hiểm</h2>
            <input type="hidden" id="editId">
            <div class="form-group"><label>Tên khách hàng</label><input type="text" id="editTenKhach"></div>
            <div class="form-group"><label>Số điện thoại</label><input type="text" id="editSdt"></div>
            <div class="form-group"><label>Địa chỉ</label><input type="text" id="editDiachi"></div>
            <div class="form-group"><label>Ngày cấp</label><input type="date" id="editNgayCap"></div>
            <div class="form-group"><label>Ngày hết hạn</label><input type="date" id="editNgayHetHan"></div>
            <div class="form-group"><label>Hãng bảo hiểm</label><input type="text" id="editHangBH"></div>
            <div class="form-group"><label>Loại xe</label><input type="text" id="editLoaiXe"></div>
            <div class="form-group"><label>Biển số xe</label><input type="text" id="editBienSo" style="text-transform:uppercase;"></div>
            <div class="form-group"><label>Ghi chú</label><textarea id="editNote"></textarea></div>

            <div style="text-align:right; margin-top:20px;">
                <button onclick="closeModal()" style="padding:10px 20px; background:#6c757d; color:white; border:none;">Hủy</button>
                <button onclick="saveBaoHiem()" style="padding:10px 20px; background:#28a745; color:white; border:none;">Lưu thay đổi</button>
            </div>
        </div>
    </div>

    <!-- Modal Đăng ký (giữ nguyên) -->
    <div id="registerModal" class="modal">
        <div class="modal-content">
            <h2>📝 Đăng ký tài khoản mới</h2>
            <div class="form-group"><label>Email</label><input type="email" id="regEmail"></div>
            <div class="form-group"><label>Mật khẩu</label><input type="password" id="regPassword"></div>
            <div class="form-group"><label>Vai trò</label>
                <select id="regRole">
                    <option value="user">Nhân viên</option>
                    <option value="admin">Quản trị viên</option>
                </select>
            </div>
            <div style="text-align:right;">
                <button onclick="closeRegisterModal()" style="padding:10px 20px; background:#6c757d; color:white; border:none;">Hủy</button>
                <button onclick="registerAccount()" style="padding:10px 20px; background:#28a745; color:white; border:none;">Đăng ký</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://baohiem-backend-kdks.onrender.com/api/baohiem";
        let danhSachBaoHiem = [];
        let currentRole = localStorage.getItem('role') || 'user';

        // Kiểm tra đăng nhập
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            alert("⛔ Bạn chưa đăng nhập!");
            window.location.href = "login.html";
        }

        if (currentRole !== 'admin') {
            const regBtn = document.getElementById('btnRegister');
            if (regBtn) regBtn.style.display = 'none';
        }

        async function loadData() {
    try {
        console.log("🔄 Đang gọi API từ:", API_URL);

        const res = await fetch(API_URL, {
            method: 'GET',
            headers: {
                'Content-Type': 'application/json'
            }
        });

        console.log("📡 Response status:", res.status, res.statusText);

        if (!res.ok) {
            throw new Error(`Lỗi server: ${res.status} ${res.statusText}`);
        }

        danhSachBaoHiem = await res.json();
        
        console.log("✅ Nhận được dữ liệu từ backend:", danhSachBaoHiem.length, "bản ghi");
        console.table(danhSachBaoHiem.slice(0, 5));   // hiển thị 5 dòng đầu

        renderTable();
        checkThongBaoDo();
        
        alert(`✅ Tải thành công ${danhSachBaoHiem.length} bản ghi từ Neon!`);
        
    } catch (err) {
        console.error("❌ LỖI KẾT NỐI:", err);
        alert("❌ Không tải được dữ liệu từ Backend!\n\nLỗi: " + err.message + "\n\nHãy mở F12 → Console và chụp ảnh lỗi gửi mình.");
    }
}

        function getTrangThai(ngayHetHan) {
            if (!ngayHetHan) return { text: "Không xác định", class: "" };
            const today = new Date();
            today.setHours(0,0,0,0);
            const hetHan = new Date(ngayHetHan);
            const diffDays = Math.ceil((hetHan - today) / (1000*60*60*24));

            if (diffDays < 0) return { text: "HẾT HẠN", class: "het-han" };
            if (diffDays <= 30) return { text: `SẮP HẾT (${diffDays} ngày)`, class: "sap-het" };
            return { text: `CÒN HẠN (${diffDays} ngày)`, class: "con-han" };
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            danhSachBaoHiem.forEach((item, index) => {
                const status = getTrangThai(item.ngayhethan);
                const row = document.createElement('tr');
                row.className = status.class === "sap-het" ? "sap-het-han" : "";
                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td><strong>${item.tenkhach || ''}</strong></td>
                    <td>${item.sdt || ''}</td>
                    <td>${item.ngaycap || ''}</td>
                    <td><strong>${item.ngayhethan || ''}</strong></td>
                    <td>${item.hangbh || ''}</td>
                    <td>${item.loaixe || ''}</td>
                    <td style="text-transform:uppercase;">${item.bienso || ''}</td>
                    <td class="note-cell" onclick="editNoteInline(this, ${item.id})">${item.note || '<i style="color:#aaa;">(Chưa có ghi chú)</i>'}</td>
                    <td><span class="status ${status.class}">${status.text}</span></td>
                    <td>
                        <button onclick="editBaoHiem(${item.id})" class="action-btn edit-btn">✏️ Sửa</button>
                        <button onclick="deleteBaoHiem(${item.id})" class="action-btn delete-btn">🗑️ Xóa</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function editNoteInline(cell, id) {
            const current = cell.textContent.trim() === '(Chưa có ghi chú)' ? '' : cell.textContent.trim();
            const input = document.createElement('textarea');
            input.className = 'note-input';
            input.value = current;
            cell.innerHTML = '';
            cell.appendChild(input);
            input.focus();

            const save = async () => {
                try {
                    await fetch(`${API_URL}/${id}`, {
                        method: 'PUT',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ note: input.value.trim() })
                    });
                    loadData();
                } catch(e) { alert("Lỗi cập nhật note"); }
            };
            input.onblur = save;
            input.onkeydown = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); save(); } };
        }

        function showAddModal() {
            document.getElementById('modalTitle').textContent = "Thêm Bảo Hiểm Mới";
            document.getElementById('editId').value = '';
            clearModalFields();
            document.getElementById('editModal').style.display = 'flex';
        }

        function editBaoHiem(id) {
            const item = danhSachBaoHiem.find(x => x.id === id);
            if (!item) return;

            document.getElementById('modalTitle').textContent = "Sửa Thông Tin Bảo Hiểm";
            document.getElementById('editId').value = item.id;
            document.getElementById('editTenKhach').value = item.tenkhach || '';
            document.getElementById('editSdt').value = item.sdt || '';
            document.getElementById('editDiachi').value = item.diachi || '';
            document.getElementById('editNgayCap').value = item.ngaycap || '';
            document.getElementById('editNgayHetHan').value = item.ngayhethan || '';
            document.getElementById('editHangBH').value = item.hangbh || '';
            document.getElementById('editLoaiXe').value = item.loaixe || '';
            document.getElementById('editBienSo').value = item.bienso || '';
            document.getElementById('editNote').value = item.note || '';
            document.getElementById('editModal').style.display = 'flex';
        }

        async function saveBaoHiem() {
            const id = document.getElementById('editId').value;
            const data = {
                tenkhach: document.getElementById('editTenKhach').value.trim(),
                sdt: document.getElementById('editSdt').value.trim(),
                diachi: document.getElementById('editDiachi').value.trim(),
                ngaycap: document.getElementById('editNgayCap').value,
                ngayhethan: document.getElementById('editNgayHetHan').value,
                hangbh: document.getElementById('editHangBH').value.trim(),
                loaixe: document.getElementById('editLoaiXe').value.trim(),
                bienso: document.getElementById('editBienSo').value.trim().toUpperCase(),
                note: document.getElementById('editNote').value.trim()
            };

            try {
                const url = id ? `${API_URL}/${id}` : API_URL;
                const method = id ? 'PUT' : 'POST';

                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    alert(id ? "✅ Cập nhật thành công!" : "✅ Thêm thành công!");
                    closeModal();
                    loadData();
                } else {
                    alert("❌ Có lỗi xảy ra");
                }
            } catch (err) {
                alert("❌ Không kết nối được với server");
            }
        }

        async function deleteBaoHiem(id) {
            if (!confirm("Bạn có chắc muốn xóa?")) return;
            try {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                loadData();
            } catch (err) {
                alert("Lỗi khi xóa");
            }
        }

        function clearModalFields() {
            document.getElementById('editTenKhach').value = '';
            document.getElementById('editSdt').value = '';
            document.getElementById('editDiachi').value = '';
            document.getElementById('editNgayCap').value = '';
            document.getElementById('editNgayHetHan').value = '';
            document.getElementById('editHangBH').value = '';
            document.getElementById('editLoaiXe').value = '';
            document.getElementById('editBienSo').value = '';
            document.getElementById('editNote').value = '';
        }

        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        function showRegisterModal() {
            if (currentRole !== 'admin') {
                alert("Chỉ Admin mới được đăng ký tài khoản!");
                return;
            }
            document.getElementById('registerModal').style.display = 'flex';
        }

        function closeRegisterModal() {
            document.getElementById('registerModal').style.display = 'none';
        }

        function registerAccount() {
            alert("Chức năng đăng ký tài khoản chưa kết nối backend. Tạm thời bỏ qua.");
            closeRegisterModal();
        }

        function logout() {
            if (confirm("Đăng xuất?")) {
                localStorage.removeItem('isLoggedIn');
                localStorage.removeItem('role');
                window.location.href = "login.html";
            }
        }

        function switchToHome() {
            window.location.href = "index.html";
        }

        function checkThongBaoDo() {
            const today = new Date();
            let count = danhSachBaoHiem.filter(item => {
                const diff = Math.ceil((new Date(item.ngayhethan) - today) / (86400000));
                return diff > 0 && diff <= 30;
            }).length;

            const bar = document.getElementById('notificationBar');
            if (count > 0) {
                document.getElementById('countExpiring').textContent = count;
                bar.style.display = 'flex';
            } else {
                bar.style.display = 'none';
            }
        }

        function hideNotification() {
            document.getElementById('notificationBar').style.display = 'none';
        }

        function searchTable() {
            const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!keyword) return renderTable();

            const filtered = danhSachBaoHiem.filter(item =>
                (item.tenkhach || '').toLowerCase().includes(keyword) ||
                (item.sdt || '').includes(keyword) ||
                (item.bienso || '').toLowerCase().includes(keyword) ||
                (item.hangbh || '').toLowerCase().includes(keyword)
            );
            renderTable(filtered);   // tạm thời render filtered trực tiếp
        }

        function exportData() {
            let csv = "\uFEFFSTT,Tên khách hàng,SĐT,Ngày cấp,Ngày hết hạn,Hãng BH,Loại xe,Biển số,Note,Trạng thái\n";
            danhSachBaoHiem.forEach((item, i) => {
                const status = getTrangThai(item.ngayhethan);
                csv += `${i+1},"${item.tenkhach || ''}","${item.sdt || ''}",${item.ngaycap || ''},${item.ngayhethan || ''},"${item.hangbh || ''}","${item.loaixe || ''}","${item.bienso || ''}","${item.note || ''}","${status.text}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `BaoHiem_Oto_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
        }

        // Khởi động
        window.onload = loadData;
    </script>
</body>
</html>
