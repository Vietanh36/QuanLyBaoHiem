<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Bảo Hiểm Ô Tô Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        body { font-family: 'Roboto', sans-serif; background: #f0f2f5; margin:0; padding:20px; }
        .container { max-width: 1600px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        
        /* Header */
        header { background: #007bff; color: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; }
        .nav-btn { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; color: white; transition: 0.3s; }
        .btn-add { background: #28a745; }
        .btn-logout { background: #dc3545; }
        .nav-btn:hover { opacity: 0.8; transform: translateY(-1px); }

        /* Notification */
        .notification-bar { background: #ff4757; color: white; padding: 12px 20px; margin: 15px; border-radius: 8px; display: none; align-items: center; justify-content: space-between; animation: slideDown 0.5s ease; }
        @keyframes slideDown { from {transform: translateY(-20px); opacity: 0;} to {transform: translateY(0); opacity: 1;} }

        .main { padding: 20px; }
        .controls { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; }
        .search-box { flex: 1; padding: 12px 25px; border-radius: 30px; border: 1px solid #ddd; outline: none; font-size: 15px; }

        /* Table Style */
        .table-wrapper { overflow-x: auto; border: 1px solid #eee; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 1300px; }
        th { background: #007bff; color: white; padding: 15px 10px; text-align: left; position: relative; }
        td { padding: 15px 10px; border-bottom: 1px solid #eee; font-size: 14px; }
        
        /* Sắp xếp */
        .sort-header { cursor: pointer; transition: 0.2s; }
        .sort-header:hover { background: #0056b3; }

        /* Excel Filter Dropdown */
        .filter-container { position: relative; display: inline-block; }
        .filter-icon { cursor: pointer; margin-left: 5px; font-size: 12px; border: 1px solid rgba(255,255,255,0.5); padding: 2px 4px; border-radius: 3px; }
        .filter-dropdown { 
            display: none; position: absolute; top: 100%; left: 0; 
            background: white; color: #333; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 15px; border-radius: 10px; z-index: 999; min-width: 200px;
            font-weight: normal; margin-top: 10px; border: 1px solid #ddd;
        }
        .filter-dropdown.show { display: block; }
        .filter-item { display: flex; align-items: center; gap: 12px; padding: 10px; cursor: pointer; border-radius: 6px; transition: 0.2s; }
        .filter-item:hover { background: #f1f3f5; }
        .filter-item input { width: 18px; height: 18px; cursor: pointer; }
        .filter-footer { border-top: 1px solid #eee; margin-top: 12px; padding-top: 12px; display: flex; gap: 10px; }
        .btn-f { flex: 1; padding: 8px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 12px; }

        /* Badges */
        .status { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; display: inline-block; min-width: 120px; text-align: center; }
        .con-han { background: #e6fcf5; color: #099268; }
        .sap-het { background: #fff9db; color: #f08c00; }
        .het-han { background: #fff5f5; color: #fa5252; }

        /* Modal Scroll Fix */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 95%; max-width: 550px; border-radius: 15px; display: flex; flex-direction: column; max-height: 90vh; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .modal-header { padding: 20px; border-bottom: 1px solid #eee; font-size: 18px; font-weight: bold; }
        .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
        .modal-footer { padding: 15px 20px; border-top: 1px solid #eee; display: flex; justify-content: flex-end; gap: 12px; background: #f8f9fa; border-radius: 0 0 15px 15px; }

        .btn-save { background: #28a745; color: white; border: none; padding: 10px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-close { background: #6c757d; color: white; border: none; padding: 10px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 500; color: #495057; }
        .form-group input, .form-group textarea { width: 100%; padding: 11px; border: 1px solid #ced4da; border-radius: 6px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div style="display: flex; align-items: center; gap: 10px;">
            <span style="font-size: 24px;">🛡️</span>
            <span style="font-size: 20px; font-weight: 700; letter-spacing: 0.5px;">QUẢN LÝ BẢO HIỂM</span>
        </div>
        <div>
            <button class="nav-btn btn-add" onclick="openAddModal()">+ Thêm Bảo Hiểm Mới</button>
            <button class="nav-btn btn-logout" onclick="alert('Đăng xuất...')">Đăng xuất</button>
        </div>
    </header>

    <div class="main">
        <div id="notif" class="notification-bar">
            <span>📢 Phát hiện <b id="notifCount">0</b> bảo hiểm sắp tới hạn. Vui lòng kiểm tra!</span>
            <button onclick="this.parentElement.style.display='none'" style="background:none; border:none; color:white; cursor:pointer; font-size: 20px;">×</button>
        </div>

        <div class="controls">
            <input type="text" id="searchInput" class="search-box" placeholder="🔍 Nhập tên khách hàng, biển số hoặc ghi chú để tìm nhanh..." onkeyup="filterData()">
            <button onclick="loadData()" style="background: #17a2b8; color:white; border:none; padding:12px 20px; border-radius:30px; cursor:pointer; font-weight:500;"> làm mới</button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>STT</th>
                        <th>Khách hàng</th>
                        <th>Số điện thoại</th>
                        <th>Ngày cấp</th>
                        <th class="sort-header" onclick="sortDataByExpiry()">Ngày hết hạn <span id="sortDir">↓</span></th>
                        <th>Hãng BH</th>
                        <th>Loại xe</th>
                        <th>Biển số</th>
                        <th>Ghi chú</th>
                        <th>
                            <div class="filter-container">
                                Trạng thái <span class="filter-icon" onclick="toggleFilter(event)">▼</span>
                                <div id="filterMenu" class="filter-dropdown" onclick="event.stopPropagation()">
                                    <div class="filter-item" onclick="toggleCheckbox('cb1')">
                                        <input type="checkbox" id="cb1" class="st-cb" value="CON_HAN" checked> Còn hạn
                                    </div>
                                    <div class="filter-item" onclick="toggleCheckbox('cb2')">
                                        <input type="checkbox" id="cb2" class="st-cb" value="SAP_HET" checked> Sắp hết
                                    </div>
                                    <div class="filter-item" onclick="toggleCheckbox('cb3')">
                                        <input type="checkbox" id="cb3" class="st-cb" value="HET_HAN" checked> Hết hạn
                                    </div>
                                    <div class="filter-footer">
                                        <button class="btn-f" style="background:#dee2e6;" onclick="checkAll(true)">Tất cả</button>
                                        <button class="btn-f" style="background:#007bff; color:white;" onclick="filterData(true)">Lọc ngay</button>
                                    </div>
                                </div>
                            </div>
                        </th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="dataModal" class="modal">
    <div class="modal-content">
        <div class="modal-header" id="modalTitle">Cập nhật thông tin</div>
        <div class="modal-body">
            <input type="hidden" id="fId">
            <div class="form-group"><label>Tên khách hàng</label><input type="text" id="fTen"></div>
            <div class="form-group"><label>Số điện thoại</label><input type="text" id="fSdt"></div>
            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex:1;"><label>Ngày cấp</label><input type="date" id="fCap"></div>
                <div class="form-group" style="flex:1;"><label>Ngày hết hạn</label><input type="date" id="fHet"></div>
            </div>
            <div class="form-group"><label>Hãng bảo hiểm</label><input type="text" id="fHang"></div>
            <div class="form-group"><label>Loại xe</label><input type="text" id="fLoai"></div>
            <div class="form-group"><label>Biển số</label><input type="text" id="fBien" style="text-transform:uppercase;"></div>
            <div class="form-group"><label>Ghi chú</label><textarea id="fNote" rows="3"></textarea></div>
        </div>
        <div class="modal-footer">
            <button class="btn-close" onclick="closeModal()">Hủy</button>
            <button class="btn-save" onclick="saveAction()">Lưu dữ liệu</button>
        </div>
    </div>
</div>

<script>
    const API = "https://baohiem-backend-kdks.onrender.com/api/baohiem";
    let rawData = [];
    let sortMode = 'DESC'; // Mặc định: Còn nhiều ngày nhất lên đầu

    async function loadData() {
        try {
            const r = await fetch(API);
            rawData = await r.json();
            
            // LOGIC QUAN TRỌNG: Sắp xếp theo ngày hết hạn giảm dần (Nhiều ngày nhất lên đầu)
            // Điều này cũng đảm bảo khi bạn thêm mới, nếu ngày hết hạn xa thì nó sẽ ở trên cùng.
            applyCurrentSort();
            
            filterData();
            updateNotif();
        } catch (e) { alert("Lỗi kết nối Server!"); }
    }

    function getInfo(d) {
        const today = new Date(); today.setHours(0,0,0,0);
        const exp = new Date(d);
        const diff = Math.ceil((exp - today) / (86400000));
        if (diff < 0) return { t: "HẾT HẠN", c: "het-han", k: "HET_HAN" };
        if (diff <= 30) return { t: `SẮP HẾT (${diff}n)`, c: "sap-het", k: "SAP_HET" };
        return { t: `CÒN HẠN (${diff}n)`, c: "con-han", k: "CON_HAN" };
    }

    function applyCurrentSort() {
        rawData.sort((a, b) => {
            const dA = new Date(a.ngayhethan);
            const dB = new Date(b.ngayhethan);
            return sortMode === 'DESC' ? dB - dA : dA - dB;
        });
    }

    function sortDataByExpiry() {
        sortMode = (sortMode === 'DESC') ? 'ASC' : 'DESC';
        document.getElementById('sortDir').innerText = sortMode === 'DESC' ? '↓' : '↑';
        applyCurrentSort();
        filterData();
    }

    function filterData(close = false) {
        const key = document.getElementById('searchInput').value.toLowerCase();
        const checks = Array.from(document.querySelectorAll('.st-cb:checked')).map(c => c.value);
        
        const filtered = rawData.filter(i => {
            const st = getInfo(i.ngayhethan);
            const mS = (i.tenkhach||"").toLowerCase().includes(key) || (i.bienso||"").toLowerCase().includes(key);
            const mC = checks.includes(st.k);
            return mS && mC;
        });

        const tb = document.getElementById('tableBody');
        tb.innerHTML = '';
        filtered.forEach((item, idx) => {
            const s = getInfo(item.ngayhethan);
            tb.innerHTML += `
                <tr>
                    <td>${idx + 1}</td>
                    <td><b>${item.tenkhach}</b></td>
                    <td>${item.sdt || ''}</td>
                    <td>${item.ngaycap ? new Date(item.ngaycap).toLocaleDateString('vi-VN') : ''}</td>
                    <td><b>${new Date(item.ngayhethan).toLocaleDateString('vi-VN')}</b></td>
                    <td>${item.hangbh || ''}</td>
                    <td>${item.loaixe || ''}</td>
                    <td style="text-transform:uppercase;">${item.bienso}</td>
                    <td style="color:#666; font-size:12px;">${item.note || ''}</td>
                    <td><span class="status ${s.c}">${s.t}</span></td>
                    <td>
                        <button class="action-btn edit-btn" onclick="openEdit(${item.id})">Sửa</button>
                        <button class="action-btn delete-btn" style="background:#ff4d4f; color:white;" onclick="deleteItem(${item.id})">Xóa</button>
                    </td>
                </tr>`;
        });
        if(close) document.getElementById('filterMenu').classList.remove('show');
    }

    // Modal logic
    function openEdit(id) {
        const item = rawData.find(x => x.id === id);
        document.getElementById('modalTitle').innerText = "✏️ Chỉnh sửa bảo hiểm";
        document.getElementById('fId').value = item.id;
        document.getElementById('fTen').value = item.tenkhach;
        document.getElementById('fSdt').value = item.sdt;
        document.getElementById('fCap').value = item.ngaycap ? item.ngaycap.split('T')[0] : '';
        document.getElementById('fHet').value = item.ngayhethan ? item.ngayhethan.split('T')[0] : '';
        document.getElementById('fHang').value = item.hangbh;
        document.getElementById('fLoai').value = item.loaixe;
        document.getElementById('fBien').value = item.bienso;
        document.getElementById('fNote').value = item.note;
        document.getElementById('dataModal').style.display = 'flex';
    }

    async function saveAction() {
        const id = document.getElementById('fId').value;
        const data = {
            tenkhach: document.getElementById('fTen').value,
            sdt: document.getElementById('fSdt').value,
            ngaycap: document.getElementById('fCap').value,
            ngayhethan: document.getElementById('fHet').value,
            hangbh: document.getElementById('fHang').value,
            loaixe: document.getElementById('fLoai').value,
            bienso: document.getElementById('fBien').value.toUpperCase(),
            note: document.getElementById('fNote').value
        };
        
        const method = id ? 'PUT' : 'POST';
        const url = id ? `${API}/${id}` : API;

        await fetch(url, {
            method: method,
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        closeModal();
        loadData();
    }

    function toggleFilter(e) { e.stopPropagation(); document.getElementById('filterMenu').classList.toggle('show'); }
    function toggleCheckbox(id) { const c = document.getElementById(id); c.checked = !c.checked; }
    function checkAll(v) { document.querySelectorAll('.st-cb').forEach(c => c.checked = v); filterData(true); }
    function closeModal() { document.getElementById('dataModal').style.display = 'none'; }
    function deleteItem(id) { if(confirm("Xóa dòng này?")) fetch(`${API}/${id}`, {method:'DELETE'}).then(()=>loadData()); }
    
    function updateNotif() {
        const c = rawData.filter(i => getInfo(i.ngayhethan).k === "SAP_HET").length;
        if(c > 0) { document.getElementById('notif').style.display = 'flex'; document.getElementById('notifCount').innerText = c; }
    }

    window.onclick = () => document.getElementById('filterMenu').classList.remove('show');
    window.onload = loadData;
</script>
</body>
</html>
