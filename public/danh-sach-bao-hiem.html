<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Bảo Hiểm Ô Tô</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        header {
            background: linear-gradient(90deg, #007bff, #0056b3);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo { font-size: 26px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .nav-btn {
            padding: 10px 22px;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
        }
        .btn-home { background: #28a745; }
        .btn-add { background: #007bff; }
        .btn-logout { background: #dc3545; }

        .main { padding: 30px; }
        .search-box {
            width: 100%;
            max-width: 450px;
            padding: 12px 20px;
            border-radius: 50px;
            border: 2px solid #ddd;
            font-size: 16px;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #007bff; color: white; position: relative; }
        .status {
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            display: inline-block;
            min-width: 145px;
            text-align: center;
        }
        .con-han { background: #d4edda; color: #155724; }
        .sap-het { background: #fff3cd; color: #856404; animation: pulse 2s infinite; }
        .het-han { background: #f8d7da; color: #721c24; }

        .action-btn {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 6px;
        }
        .edit-btn { background: #ffc107; color: #212529; }
        .delete-btn { background: #dc3545; color: white; }

        .filter-btn {
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            margin-left: 8px;
        }

        .note-cell { cursor: pointer; min-width: 180px; }
        .note-cell:hover { background: #f8f9fa; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 90%;
            max-width: 520px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.85; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">🚗 Danh Sách Bảo Hiểm Ô Tô</div>
            <div>
                <button onclick="switchToHome()" class="nav-btn btn-home">🏠 Trang Chủ</button>
                <button onclick="switchToAdd()" class="nav-btn btn-add">Thêm Bảo Hiểm Mới</button>
                <button onclick="logout()" class="nav-btn btn-logout">Đăng xuất</button>
            </div>
        </header>

        <div class="main">
            <div style="margin-bottom:15px; display:flex; gap:10px; flex-wrap:wrap;">
                <input type="text" id="searchInput" class="search-box" 
                       placeholder="🔎 Tìm theo tên, biển số, hãng BH..." onkeyup="searchTable()">
                
                <button onclick="loadData()" style="padding:10px 22px; background:#17a2b8; color:white; border:none; border-radius:8px; cursor:pointer;">
                    🔄 Tải lại từ Server
                </button>
            </div>

            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr>
                            <th>STT</th>
                            <th>Tên khách hàng</th>
                            <th>SĐT</th>
                            <th>Ngày cấp</th>
                            <th>Ngày hết hạn</th>
                            <th>Hãng BH</th>
                            <th>Loại xe</th>
                            <th>Biển số</th>
                            <th>Note</th>
                            <th>
                                Trạng thái 
                                <button class="filter-btn" onclick="toggleFilter(event)">▼</button>
                            </th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <div style="text-align:center; padding:25px; background:#f8f9fa;">
            <button onclick="exportData()" style="background:#007bff; color:white; padding:12px 30px; border:none; border-radius:8px; font-size:16px; cursor:pointer;">
                📤 Xuất File Excel (CSV)
            </button>
        </div>
    </div>

    <script>
        const API_URL = "https://baohiem-backend-kdks.onrender.com/api/baohiem";
        let danhSachBaoHiem = [];
        let currentFilter = "ALL";

        async function loadData() {
            try {
                const res = await fetch(API_URL);
                danhSachBaoHiem = await res.json();
                renderTable();
            } catch (err) {
                alert("❌ Không tải được dữ liệu từ server!");
                console.error(err);
            }
        }

        function getTrangThai(ngayHetHan) {
            if (!ngayHetHan) return { text: "Không rõ", class: "" };
            const today = new Date();
            const hetHan = new Date(ngayHetHan);
            const diffDays = Math.ceil((hetHan - today) / (1000 * 60 * 60 * 24));

            if (diffDays < 0) return { text: "HẾT HẠN", class: "het-han" };
            if (diffDays <= 30) return { text: `SẮP HẾT (${diffDays} ngày)`, class: "sap-het" };
            return { text: `CÒN HẠN (${diffDays} ngày)`, class: "con-han" };
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            let list = danhSachBaoHiem;

            // Áp dụng lọc trạng thái
            if (currentFilter !== "ALL") {
                list = list.filter(item => {
                    const st = getTrangThai(item.ngayhethan || item.ngayHetHan);
                    return (currentFilter === "CON_HAN" && st.class === "con-han") ||
                           (currentFilter === "SAP_HET" && st.class === "sap-het") ||
                           (currentFilter === "HET_HAN" && st.class === "het-han");
                });
            }

            list.forEach((item, index) => {
                const status = getTrangThai(item.ngayhethan || item.ngayHetHan);
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${item.tenkhach || item.tenKhach || ''}</td>
                    <td>${item.sdt || ''}</td>
                    <td>${item.ngaycap ? new Date(item.ngaycap).toLocaleDateString('vi-VN') : ''}</td>
                    <td>${item.ngayhethan ? new Date(item.ngayhethan).toLocaleDateString('vi-VN') : ''}</td>
                    <td>${item.hangbh || item.hangBH || ''}</td>
                    <td>${item.loaixe || item.loaiXe || ''}</td>
                    <td style="text-transform:uppercase">${item.bienso || item.bienSo || ''}</td>
                    <td>${item.note || '(Chưa có)'}</td>
                    <td><span class="status ${status.class}">${status.text}</span></td>
                    <td>
                        <button onclick="editBaoHiem(${item.id})" class="action-btn edit-btn">Sửa</button>
                        <button onclick="deleteBaoHiem(${item.id})" class="action-btn delete-btn">Xóa</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function toggleFilter(e) {
            // Xóa menu cũ nếu có
            let oldMenu = document.getElementById('filterMenu');
            if (oldMenu) oldMenu.remove();

            const menu = document.createElement('div');
            menu.id = 'filterMenu';
            menu.style.cssText = `
                position: absolute; 
                background: white; 
                border: 1px solid #ccc; 
                border-radius: 8px; 
                box-shadow: 0 5px 20px rgba(0,0,0,0.25); 
                padding: 8px 0; 
                z-index: 1000; 
                min-width: 220px;
            `;

            const rect = e.currentTarget.getBoundingClientRect();
            menu.style.top = (rect.bottom + window.scrollY + 8) + 'px';
            menu.style.left = (rect.left + window.scrollX - 20) + 'px';

            menu.innerHTML = `
                <div style="padding:10px 16px; font-weight:600; color:#007bff;">Lọc theo trạng thái</div>
                <div onclick="applyFilter('ALL')" style="padding:12px 20px; cursor:pointer;">📋 Tất cả</div>
                <div style="border-top:1px solid #eee; margin:5px 0;"></div>
                <div onclick="applyFilter('CON_HAN')" style="padding:12px 20px; cursor:pointer;">🟢 Còn hạn</div>
                <div onclick="applyFilter('SAP_HET')" style="padding:12px 20px; cursor:pointer;">🟡 Sắp hết hạn</div>
                <div onclick="applyFilter('HET_HAN')" style="padding:12px 20px; cursor:pointer;">🔴 Hết hạn</div>
            `;

            document.body.appendChild(menu);

            // Click ngoài để đóng menu
            setTimeout(() => {
                document.addEventListener('click', function closeMenu(ev) {
                    if (!menu.contains(ev.target)) {
                        menu.remove();
                        document.removeEventListener('click', closeMenu);
                    }
                });
            }, 10);
        }

        function applyFilter(filterType) {
            currentFilter = filterType;
            document.getElementById('filterMenu').remove();
            renderTable();
        }

        function searchTable() {
            const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!keyword) return renderTable();

            const filtered = danhSachBaoHiem.filter(item =>
                (item.tenkhach || '').toLowerCase().includes(keyword) ||
                (item.bienso || '').toLowerCase().includes(keyword) ||
                (item.hangbh || '').toLowerCase().includes(keyword)
            );

            // Render filtered list
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            // Tạm thời render lại full, bạn có thể cải tiến sau
            renderTable();
        }

        async function deleteBaoHiem(id) {
            if (!confirm("Xóa bảo hiểm này?")) return;
            try {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                loadData();
            } catch (e) {
                alert("Lỗi khi xóa");
            }
        }

        function editBaoHiem(id) {
            alert("Chức năng sửa chi tiết sẽ được thêm sau.");
        }

        function exportData() {
            alert("Chức năng xuất Excel đang được hoàn thiện.");
        }

        function switchToHome() { window.location.href = "index.html"; }
        function switchToAdd() { window.location.href = "index.html"; }

        function logout() {
            if (confirm("Đăng xuất?")) {
                localStorage.clear();
                window.location.href = "login.html";
            }
        }

        // Tự động load dữ liệu
        window.onload = loadData;
    </script>
</body>
</html>
